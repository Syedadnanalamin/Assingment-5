<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- daisy && tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <section class="max-w-lg  h-screen mx-auto flex flex-col items-center  mt-5 bg-white rounded-xl shadow-lg p-6">


        <header class="w-xs h-40 flex flex-col  items-center ">
            <div class="logo h-20 w-20 mx-auto">
                <img src="/assets/github-logo.png" alt="">
            </div>
            <h1>Github Issue Tracker</h1>
            <h2>Sign in to manage your issues</h2>
        </header>

        <!-- input field -->
        <fieldset class="fieldset  border-base-300 border-none w-xs border p-4">


            <label class="label">Username</label>
            <input type="text" class="input" placeholder="Enter Username" id="username" />
            <p class="text-[#4A00FF]">Default: admin</p>

            <label class="label">Password</label>
            <input type="password" class="input" placeholder=" Enter Password" id="password" />
            <p class="text-[#4A00FF]">Default: admin123</p>

            <button class="btn btn-neutral mt-4" id="logingbtn">Login</button>
            <div class="flex flex-col items-center">
                <p class="font-bold">OR</p>
                <p>Demo credentials:</p>
                <br>
                <p>
                    <span class="font-semibold">Username: </span>admin
                </p>
                <p><span class="font-semibold">Password: </span>admin123</p>
            </div>
        </fieldset>
    </section>


    <script src="Javascript/loging.js"></script>
</body>

</html>
